@for (recipe of recipes(); track recipe.id) {
  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title">{{ recipe.name }}</h5>
      <p class="card-text">{{ recipe.description }}</p>
      <button class="btn btn-primary" [routerLink]="['/edit-recipe',recipe.id]">Edit</button>
    </div>
  </div>
}
